<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Câmera Inteligente | Nexus Vision</title>
    <link rel="stylesheet" href="../src/css/estilo.css">
</head>
<body>

    <header class="site-header">
        <div class="logo">
            <span>◉</span>
            <strong>Nexus Vision</strong>
        </div>
        <nav class="navbar" id="navbar">
            <a href="../index.html">Home</a>
            <a href="./camera.html">Câmera</a>
            <a href="./scanner.html">Scanner</a>
            <a href="./galeria.html">Galeria</a>
            <a href="./sobre.html">Sobre</a>
            <a href="./login.html" class="login-link">Login</a>
        </nav>
        <button id="themeBtn" class="theme-btn">🌙</button>
        <button id="menuBtn" class="menu-btn">☰</button>
    </header>

    <main class="camera-container">

        <section class="camera-preview retrato-mode" id="cameraPreview">
            <video id="cameraVideo" autoplay muted playsinline></video>
            <div class="overlay" id="overlayIA">IA analisando ambiente...</div>
            <div class="camera-info" id="cameraInfo">Modo atual: Retrato</div>
        </section>

        <section class="camera-acoes">
            <button id="btnCapturar">Capturar</button>
        </section>

        <section class="status-camera">
            <p id="statusMensagem">IA pronta para captura.</p>
        </section>

        <section class="modos-camera">
            <button class="modo ativo" data-mode="retrato">Retrato</button>
            <button class="modo" data-mode="noturno">Noturno</button>
            <button class="modo" data-mode="iahd">IA HD</button>
        </section>

    </main>

    <footer class="site-footer">
        <p>Nexus Vision • Sprint 2 •  Web Development • FrontEnd Design </p>
    </footer>

    <script src="../src/js/menu.js"></script>
    <script src="../src/js/camera.js"></script>

</body>
</html>
