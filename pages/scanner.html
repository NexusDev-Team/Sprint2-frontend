<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Inteligente | Nexus Vision</title>
    <link rel="stylesheet" href="../src/css/estilo.css">
</head>
<body>

    <header class="site-header">
        <div class="logo">
            <img src="../src/assets/logo.png" alt="logo nexus vision" id="logo">
            <strong>Nexus Vision</strong>
        </div>
        <nav class="navbar" id="navbar">
            <a href="../index.html">Home</a>
            <a href="./camera.html">Câmera</a>
            <a href="./scanner.html">Scanner</a>
            <a href="./galeria.html">Galeria</a>
            <a href="./sobre.html">Sobre</a>
            <a href="./login.html" class="login-link">Login</a>
        </nav>
        <button id="themeBtn" class="theme-btn">🌙</button>
        <button id="menuBtn" class="menu-btn">☰</button>
    </header>

    <main class="scanner-container">

        <section class="scanner-area" id="scannerArea">
            <video id="scannerVideo" autoplay muted playsinline></video>
            <div class="scanner-overlay">
                <div class="scanner-box"></div>
                <div class="scanner-line"></div>
            </div>
        </section>

        <section class="scanner-info">
            <p id="scan-status">Posicione o documento na área</p>
        </section>

        <button id="scan-btn">Escanear Documento</button>

    </main>

    <footer class="site-footer">
        <p>Nexus Vision • Sprint 2 •  Web Development • FrontEnd Design </p>
    </footer>

    <script src="../src/js/menu.js"></script>
    <script src="../src/js/scanner.js"></script>

</body>
</html>
